<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 API Canciones Favoritas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem 0; border-radius: 0 0 20px 20px; margin-bottom: 2rem; }
        .song-card { transition: transform 0.2s; border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .song-card:hover { transform: translateY(-5px); }
        .favorite-btn { cursor: pointer; color: #ffc107; font-size: 1.5rem; }
        .favorite-btn.inactive { color: #dee2e6; }
    </style>
</head>
<body>

    <div class="hero text-center shadow-sm">
        <div class="container">
            <h1 class="display-4 fw-bold">🎧 Mi Colección de Música</h1>
            <p class="lead">Gestiona tus canciones favoritas</p>
        </div>
    </div>

    <div class="container">
        <div class="row mb-4 align-items-center bg-white p-3 rounded shadow-sm mx-0">
            <div class="col-md-3 mb-2 mb-md-0">
                <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#songModal" id="btnNueva">
                    ➕ Nueva
                </button>
            </div>
            <div class="col-md-3 mb-2 mb-md-0">
                <button class="btn btn-success w-100" id="btnSpotify" onclick="window.location.href='http://localhost:3000/api/spotify/login'">
                    🎧 Importar Spotify
                </button>
            </div>
            <div class="col-md-3 mb-2 mb-md-0">
                <select class="form-select" id="filterGenero">
                    <option value="">Todos los géneros</option>
                    <option value="pop">Pop</option>
                    <option value="rock">Rock</option>
                    <option value="reggaeton">Reggaeton</option>
                    <option value="hip hop">Hip Hop</option>
                    <option value="electronica">Electrónica</option>
                    <option value="jazz">Jazz</option>
                    <option value="clasica">Clásica</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="col-md-3">
                <div class="form-check form-switch d-flex align-items-center h-100">
                    <input class="form-check-input me-2 mt-0" type="checkbox" id="filterFavoritas">
                    <label class="form-check-label mb-0" for="filterFavoritas">Solo favoritas</label>
                </div>
            </div>
        </div>

        <div class="row" id="songsContainer">
            <div class="text-center w-100 mt-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="songModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Agregar Canción</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="songForm">
                        <input type="hidden" id="songId">
                        <div class="mb-3">
                            <label class="form-label">Nombre de la Canción</label>
                            <input type="text" class="form-control" id="songName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Artista</label>
                            <input type="text" class="form-control" id="songArtist" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Género</label>
                            <select class="form-select" id="songGenre" required>
                                <option value="pop">Pop</option>
                                <option value="rock">Rock</option>
                                <option value="reggaeton">Reggaeton</option>
                                <option value="hip hop">Hip Hop</option>
                                <option value="electronica">Electrónica</option>
                                <option value="jazz">Jazz</option>
                                <option value="clasica">Clásica</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="songFavorite">
                            <label class="form-check-label">Es favorita</label>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
